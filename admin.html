<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Shipped.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0B1220; --panel: #121B2E; --line: #26324A;
    --blueprint: #3E6CB5; --signal: #FFB454; --live: #4ADE80;
    --paper: #EDE9E1; --muted: #8B94A8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--ink); color: var(--paper);
    font-family: 'Inter', sans-serif; min-height: 100vh;
    display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  .login-box {
    background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
    padding: 40px; max-width: 360px; width: 100%; text-align: center;
  }
  .login-box h1 { font-family: 'Space Grotesk', sans-serif; font-size: 1.3rem; margin-bottom: 20px; }
  .login-box input {
    width: 100%; background: var(--ink); border: 1px solid var(--line); border-radius: 6px;
    padding: 12px 14px; color: var(--paper); font-size: 0.95rem; margin-bottom: 14px;
  }
  .login-box button {
    width: 100%; background: var(--signal); color: var(--ink); font-weight: 600;
    padding: 12px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.95rem;
  }
  .error { color: #FF8080; font-size: 0.85rem; margin-top: 10px; min-height: 18px; }

  .dashboard { display: none; max-width: 1000px; width: 100%; }
  .dashboard.show { display: block; }
  .login-box.hide { display: none; }

  header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  header h1 { font-family: 'Space Grotesk', sans-serif; font-size: 1.4rem; }
  header .count { font-family: 'JetBrains Mono', monospace; color: var(--muted); font-size: 0.85rem; }

  table { width: 100%; border-collapse: collapse; background: var(--panel); border-radius: 10px; overflow: hidden; }
  th, td { text-align: left; padding: 14px 16px; border-bottom: 1px solid var(--line); font-size: 0.88rem; }
  th { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; text-transform: uppercase; color: var(--muted); letter-spacing: 0.05em; }
  td { color: var(--paper); }
  td.muted { color: var(--muted); font-size: 0.8rem; white-space: nowrap; }
  tr:last-child td { border-bottom: none; }
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
</style>
</head>
<body>

  <div class="login-box" id="loginBox">
    <h1>Admin Login</h1>
    <input type="password" id="passwordInput" placeholder="Password" onkeydown="if(event.key==='Enter') login()">
    <button onclick="login()">Log in</button>
    <div class="error" id="loginError"></div>
  </div>

  <div class="dashboard" id="dashboard">
    <header>
      <h1>Client Requests</h1>
      <div class="count" id="count"></div>
    </header>
    <div id="tableWrap"></div>
  </div>

<script>
  let savedPassword = '';

  async function login() {
    const pw = document.getElementById('passwordInput').value;
    const errorEl = document.getElementById('loginError');
    errorEl.textContent = '';

    try {
      const res = await fetch('/api/submissions', {
        headers: { 'x-admin-password': pw }
      });

      if (res.status === 401) {
        errorEl.textContent = 'Incorrect password.';
        return;
      }

      const data = await res.json();
      savedPassword = pw;
      document.getElementById('loginBox').classList.add('hide');
      document.getElementById('dashboard').classList.add('show');
      renderSubmissions(data.submissions);
    } catch (err) {
      errorEl.textContent = 'Something went wrong. Try again.';
    }
  }

  function renderSubmissions(submissions) {
    document.getElementById('count').textContent = submissions.length + ' total';
    const wrap = document.getElementById('tableWrap');

    if (submissions.length === 0) {
      wrap.innerHTML = '<div class="empty">No client requests yet — they\'ll show up here as they come in.</div>';
      return;
    }

    let html = '<table><thead><tr><th>Date</th><th>Name</th><th>Contact</th><th>Type</th><th>Details</th></tr></thead><tbody>';
    submissions.forEach(s => {
      const date = new Date(s.created_at).toLocaleString('en-IN', { dateStyle: 'medium', timeStyle: 'short' });
      html += `<tr>
        <td class="muted">${date}</td>
        <td>${escapeHtml(s.name || '')}</td>
        <td>${escapeHtml(s.contact || '')}</td>
        <td>${escapeHtml(s.project_type || '')}</td>
        <td>${escapeHtml(s.details || '')}</td>
      </tr>`;
    });
    html += '</tbody></table>';
    wrap.innerHTML = html;
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }
</script>

</body>
</html>
